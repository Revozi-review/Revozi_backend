<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body{margin:0!important;padding:0!important;background-color:#0f0f11!important;}
  @media only screen and (max-width:600px){
    .eb{background-color:#0f0f11!important;}.ec{background-color:#18181b!important;}
    .eh,.ef,.ebt{background-color:#18181b!important;}
    .eh1{color:#e4e4e7!important;font-weight:700!important;}.ep{color:#a1a1aa!important;}
  }
</style>
</head>
<body style="margin:0;padding:0;background-color:#0f0f11;" bgcolor="#0f0f11">
<div class="eb" style="background-color:#0f0f11;padding:48px 20px;">
<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#0f0f11;">
<tr><td align="center">
<table class="ec" width="560" cellpadding="0" cellspacing="0" border="0" style="max-width:560px;width:100%;background-color:#18181b;border:1px solid #27272a;border-radius:16px;overflow:hidden;">
<tr><td class="eh" style="padding:32px 40px;border-bottom:1px solid #27272a;background-color:#18181b;text-align:center;">
  <img src="https://revozi-backend-production.up.railway.app/static/PHOTO-2026-02-21-02-27-04.jpg" alt="Revozi" height="50" style="display:block;margin:0 auto;" />
</td></tr>
<tr><td class="ebt" style="padding:40px;background-color:#18181b;">
  <h1 class="eh1" style="margin:0 0 16px;font-size:24px;font-weight:700;color:#e4e4e7;font-family:Arial,sans-serif;">Payment confirmed</h1>
  <p class="ep" style="margin:0 0 28px;font-size:15px;line-height:1.7;color:#a1a1aa;font-family:Arial,sans-serif;">Hi {{name}}, we have successfully received your payment.<br><br>Here are your payment details:</p>
  <table cellpadding="0" cellspacing="0" border="0" width="100%" style="margin-bottom:28px;">
    <tr><td style="background-color:#09090b;border:1px solid #27272a;border-radius:10px;padding:24px;">
      <table cellpadding="0" cellspacing="0" border="0" width="100%">
        <tr><td style="padding:8px 0;border-bottom:1px solid #27272a;">
          <p style="margin:0;font-size:13px;color:#71717a;font-family:Arial,sans-serif;">Amount paid</p>
          <p style="margin:4px 0 0;font-size:16px;font-weight:600;color:#22c55e;font-family:Arial,sans-serif;">${{amount}}</p>
        </td></tr>
        <tr><td style="padding:8px 0;border-bottom:1px solid #27272a;">
          <p style="margin:0;font-size:13px;color:#71717a;font-family:Arial,sans-serif;">Plan</p>
          <p style="margin:4px 0 0;font-size:15px;color:#e4e4e7;font-family:Arial,sans-serif;">{{plan_name}}</p>
        </td></tr>
        <tr><td style="padding:8px 0;">
          <p style="margin:0;font-size:13px;color:#71717a;font-family:Arial,sans-serif;">Next billing date</p>
          <p style="margin:4px 0 0;font-size:15px;color:#e4e4e7;font-family:Arial,sans-serif;">{{next_billing_date}}</p>
        </td></tr>
      </table>
    </td></tr>
  </table>
  <a href="{{dashboard_url}}" style="display:inline-block;background-color:#7c6dfa;color:#ffffff;text-decoration:none;padding:14px 28px;border-radius:8px;font-size:15px;font-weight:600;font-family:Arial,sans-serif;">Go to Dashboard</a>
</td></tr>
<tr><td class="ef" style="padding:28px 40px;border-top:1px solid #27272a;background-color:#18181b;text-align:center;">
  <p style="margin:0 0 8px;font-size:13px;color:#71717a;font-family:Arial,sans-serif;">2026 Revozi.<br><br>All rights reserved.</p>
  <p style="margin:0;font-size:13px;color:#52525b;font-family:Arial,sans-serif;"><a href="https://revozi.com" style="color:#7c6dfa;text-decoration:none;">revozi.com</a></p>
</td></tr>
</table></td></tr></table></div></body></html>
