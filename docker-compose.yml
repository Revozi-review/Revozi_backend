version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: revozi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/revozi
      AUTOMATION_SERVICE_URL: http://automation:5001
    env_file:
      - .env

  automation:
    build:
      context: ../Default-Automation
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    depends_on:
      - db
    environment:
      PORT: "5001"
      DATABASE_URL: postgresql://postgres:postgres@db:5432/revozi
      CORS_ORIGIN: http://localhost:8000
    env_file:
      - ../Default-Automation/.env

volumes:
  postgres_data:
